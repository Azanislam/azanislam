<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Время намаза</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #f5f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 20, 10, 0.08);
            padding: 28px 24px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(46, 125, 90, 0.15);
        }
        .arabic-shahada {
            font-family: 'Traditional Arabic', 'Amiri', 'Times New Roman', serif;
            font-size: 1.8rem;
            text-align: center;
            color: #2e7d5a;
            margin-bottom: 20px;
            line-height: 1.4;
            font-weight: 500;
            letter-spacing: 1px;
            direction: rtl;
        }
        .date-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .date-badge {
            background: #e9f2ef;
            color: #1e3c3f;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            display: inline-block;
        }
        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 18px;
            background: #fafdfb;
            border-radius: 20px;
            border-left: 5px solid;
            transition: all 0.1s;
        }
        .today-highlight {
            background: #fffbf0;
            border-left-color: #f4b836 !important;
            box-shadow: 0 4px 10px rgba(244, 184, 54, 0.1);
        }
        .prayer-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e3c3f;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prayer-time {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3c3f;
            background: white;
            padding: 5px 14px;
            border-radius: 30px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .event-message {
            margin-top: 24px;
            padding: 14px 16px;
            background: #f0f7f4;
            border-radius: 20px;
            color: #1e3c3f;
            font-size: 1rem;
            text-align: center;
            border: 1px dashed #2e7d5a;
        }
        .footer-note {
            margin-top: 20px;
            color: #5a7c70;
            font-size: 0.9rem;
            text-align: center;
        }
        .subnote {
            font-size: 0.8rem;
            color: #7a9b9f;
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Шахада на арабском -->
        <div class="arabic-shahada">
            أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا ٱللَّٰهُ<br>وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ ٱللَّٰهِ
        </div>
        
        <!-- Дата -->
        <div class="date-header">
            <div class="date-badge" id="dateDisplay"></div>
        </div>
        
        <!-- Список намазов -->
        <div class="prayer-list" id="prayerList"></div>
        
        <!-- Событие дня -->
        <div class="event-message" id="eventMessage"></div>
        
        <!-- Подпись -->
        <div class="footer-note">
            «Спешите к молитве, спешите к спасению»
        </div>
    </div>

    <script>
        // ===============================================
        // ВСТРОЕННОЕ РАСПИСАНИЕ НА АПРЕЛЬ 2026
        // Формат: [день, Фаджр, Восход, Зухр, Аср, Магриб, Иша, Событие]
        // ===============================================
        const SCHEDULE = [
            [1, "03:50", "06:02", "12:34", "16:30", "19:33", "21:00", ""],
            [2, "03:47", "05:59", "12:34", "16:31", "19:35", "21:02", ""],
            [3, "03:44", "05:57", "12:33", "16:32", "19:37", "21:04", ""],
            [4, "03:40", "05:54", "12:33", "16:33", "19:40", "21:06", ""],
            [5, "03:37", "05:51", "12:33", "16:34", "19:42", "21:08", ""],
            [6, "03:33", "05:49", "12:32", "16:35", "19:44", "21:10", ""],
            [7, "03:29", "05:46", "12:32", "16:36", "19:46", "21:12", ""],
            [8, "03:26", "05:44", "12:32", "16:37", "19:48", "21:14", ""],
            [9, "03:22", "05:41", "12:32", "16:38", "19:50", "21:16", ""],
            [10, "03:18", "05:39", "12:31", "16:39", "19:52", "21:18", ""],
            [11, "03:15", "05:36", "12:31", "16:40", "19:54", "21:20", ""],
            [12, "03:11", "05:33", "12:31", "16:41", "19:56", "21:22", ""],
            [13, "03:07", "05:31", "12:30", "16:42", "19:59", "21:24", ""],
            [14, "03:03", "05:28", "12:30", "16:43", "20:01", "21:26", "Мученическая смерть Имама Джафара Садига (а)"],
            [15, "02:59", "05:26", "12:30", "16:44", "20:03", "21:28", ""],
            [16, "02:55", "05:23", "12:30", "16:45", "20:05", "21:30", ""],
            [17, "02:51", "05:21", "12:29", "16:46", "20:07", "21:32", ""],
            [18, "02:46", "05:18", "12:29", "16:47", "20:09", "21:34", ""],
            [19, "02:42", "05:16", "12:29", "16:48", "20:12", "21:36", ""],
            [20, "02:38", "05:14", "12:29", "16:49", "20:14", "21:38", ""],
            [21, "02:33", "05:11", "12:29", "16:50", "20:16", "21:40", ""],
            [22, "02:29", "05:09", "12:28", "16:51", "20:18", "21:42", ""],
            [23, "02:24", "05:06", "12:28", "16:52", "20:20", "21:44", ""],
            [24, "02:19", "05:04", "12:28", "16:53", "20:22", "21:46", ""],
            [25, "02:14", "05:02", "12:28", "16:54", "20:25", "21:48", ""],
            [26, "02:09", "04:59", "12:28", "16:55", "20:27", "21:50", ""],
            [27, "02:04", "04:57", "12:27", "16:56", "20:29", "21:52", ""],
            [28, "01:58", "04:55", "12:27", "16:57", "20:31", "21:54", ""],
            [29, "01:52", "04:52", "12:27", "16:58", "20:33", "21:56", ""],
            [30, "01:46", "04:50", "12:27", "16:59", "20:36", "21:58", ""]
        ];

        // Названия намазов и индексы в массиве
        const PRAYERS = [
            { name: "Фаджр", idx: 1, icon: "🌙", color: "#1e3c3f" },
            { name: "Восход", idx: 2, icon: "☀️", color: "#2e7d5a" },
            { name: "Зухр", idx: 3, icon: "☀️", color: "#2e7d5a" },
            { name: "Аср", idx: 4, icon: "🌤️", color: "#2e7d5a" },
            { name: "Магриб", idx: 5, icon: "🌆", color: "#2e7d5a" },
            { name: "Иша", idx: 6, icon: "🌙", color: "#1e3c3f" }
        ];

        // Получить сегодняшнюю дату (для демо используем фикс. дату, если не апрель 2026)
        function getToday() {
            const now = new Date();
            // Если сейчас апрель 2026, берём реальную дату
            if (now.getFullYear() === 2026 && now.getMonth() === 3) { // 3 = апрель
                return now;
            } else {
                // Иначе показываем 19 апреля 2026 для примера
                return new Date(2026, 3, 19);
            }
        }

        // Найти данные для дня
        function getPrayerDataForDay(day) {
            return SCHEDULE.find(row => row[0] === day);
        }

        // Отобразить всё
        function render() {
            const today = getToday();
            const day = today.getDate();
            const monthNames = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];
            const monthStr = monthNames[today.getMonth()];
            const year = today.getFullYear();
            
            document.getElementById('dateDisplay').textContent = `${day} ${monthStr} ${year}`;
            
            const row = getPrayerDataForDay(day);
            const listDiv = document.getElementById('prayerList');
            const eventDiv = document.getElementById('eventMessage');
            
            if (!row) {
                listDiv.innerHTML = '<div style="padding:20px;text-align:center;">Нет данных на сегодня</div>';
                eventDiv.innerHTML = '';
                return;
            }
            
            // Строим список намазов
            let html = '';
            for (let p of PRAYERS) {
                const time = row[p.idx];
                const isToday = (day === today.getDate());
                html += `
                    <div class="prayer-item ${isToday ? 'today-highlight' : ''}" style="border-left-color: ${p.color};">
                        <span class="prayer-name">${p.icon} ${p.name}</span>
                        <span class="prayer-time">${time}</span>
                    </div>
                `;
            }
            listDiv.innerHTML = html;
            
            // Событие
            const eventText = row[7];
            if (eventText && eventText.trim() !== '') {
                eventDiv.innerHTML = `📌 ${eventText}`;
            } else {
                eventDiv.innerHTML = '✨ Сегодня обычный день';
            }
        }

        render();
    </script>
</body>
</html>
