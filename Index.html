<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Время намаза</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 28px 24px;
            max-width: 420px;
            width: 100%;
        }
        .arabic {
            font-family: 'Amiri', 'Times New Roman', serif;
            font-size: 1.8rem;
            text-align: center;
            color: #2e7d5a;
            margin-bottom: 20px;
            direction: rtl;
        }
        .date {
            text-align: center;
            background: #e9f2ef;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            background: #fafdfb;
            border-radius: 20px;
            margin-bottom: 6px;
            border-left: 5px solid #2e7d5a;
        }
        .prayer-name {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .prayer-time {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .event {
            margin-top: 20px;
            padding: 14px;
            background: #f0f7f4;
            border-radius: 20px;
            text-align: center;
        }
        .footer {
            text-align: center;
            color: #5a7c70;
            margin-top: 20px;
        }
        .today {
            background: #fffbf0;
            border-left-color: #f4b836;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="arabic">
        أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا ٱللَّٰهُ<br>وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ ٱللَّٰهِ
    </div>
    <div class="date" id="dateDisplay"></div>
    <div id="prayerList"></div>
    <div class="event" id="eventMessage"></div>
    <div class="footer">«Спешите к молитве, спешите к спасению»</div>
</div>
<script>
    // Расписание на апрель 2026 (день, Фаджр, Восход, Зухр, Аср, Магриб, Иша, Событие)
    const SCHEDULE = [
        [1,"03:50","06:02","12:34","16:30","19:33","21:00",""],
        [2,"03:47","05:59","12:34","16:31","19:35","21:02",""],
        [3,"03:44","05:57","12:33","16:32","19:37","21:04",""],
        [4,"03:40","05:54","12:33","16:33","19:40","21:06",""],
        [5,"03:37","05:51","12:33","16:34","19:42","21:08",""],
        [6,"03:33","05:49","12:32","16:35","19:44","21:10",""],
        [7,"03:29","05:46","12:32","16:36","19:46","21:12",""],
        [8,"03:26","05:44","12:32","16:37","19:48","21:14",""],
        [9,"03:22","05:41","12:32","16:38","19:50","21:16",""],
        [10,"03:18","05:39","12:31","16:39","19:52","21:18",""],
        [11,"03:15","05:36","12:31","16:40","19:54","21:20",""],
        [12,"03:11","05:33","12:31","16:41","19:56","21:22",""],
        [13,"03:07","05:31","12:30","16:42","19:59","21:24",""],
        [14,"03:03","05:28","12:30","16:43","20:01","21:26","Мученическая смерть Имама Джафара Садига (а)"],
        [15,"02:59","05:26","12:30","16:44","20:03","21:28",""],
        [16,"02:55","05:23","12:30","16:45","20:05","21:30",""],
        [17,"02:51","05:21","12:29","16:46","20:07","21:32",""],
        [18,"02:46","05:18","12:29","16:47","20:09","21:34",""],
        [19,"02:42","05:16","12:29","16:48","20:12","21:36",""],
        [20,"02:38","05:14","12:29","16:49","20:14","21:38",""],
        [21,"02:33","05:11","12:29","16:50","20:16","21:40",""],
        [22,"02:29","05:09","12:28","16:51","20:18","21:42",""],
        [23,"02:24","05:06","12:28","16:52","20:20","21:44",""],
        [24,"02:19","05:04","12:28","16:53","20:22","21:46",""],
        [25,"02:14","05:02","12:28","16:54","20:25","21:48",""],
        [26,"02:09","04:59","12:28","16:55","20:27","21:50",""],
        [27,"02:04","04:57","12:27","16:56","20:29","21:52",""],
        [28,"01:58","04:55","12:27","16:57","20:31","21:54",""],
        [29,"01:52","04:52","12:27","16:58","20:33","21:56",""],
        [30,"01:46","04:50","12:27","16:59","20:36","21:58",""]
    ];
    const PRAYERS = [
        {name:"Фаджр", idx:1, icon:"🌙"},
        {name:"Восход", idx:2, icon:"☀️"},
        {name:"Зухр", idx:3, icon:"☀️"},
        {name:"Аср", idx:4, icon:"🌤️"},
        {name:"Магриб", idx:5, icon:"🌆"},
        {name:"Иша", idx:6, icon:"🌙"}
    ];
    function getToday(){
        const now = new Date();
        if(now.getFullYear()===2026 && now.getMonth()===3) return now;
        return new Date(2026,3,19); // 19 апреля 2026 для демо
    }
    function render(){
        const today = getToday();
        const day = today.getDate();
        const monthNames = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
        document.getElementById('dateDisplay').textContent = `${day} ${monthNames[today.getMonth()]} ${today.getFullYear()}`;
        const row = SCHEDULE.find(r=>r[0]===day);
        if(!row) return;
        let html = '';
        for(let p of PRAYERS){
            const time = row[p.idx];
            const isToday = (day===today.getDate());
            html += `<div class="prayer-item ${isToday?'today':''}">
                <span class="prayer-name">${p.icon} ${p.name}</span>
                <span class="prayer-time">${time}</span>
            </div>`;
        }
        document.getElementById('prayerList').innerHTML = html;
        const event = row[7];
        document.getElementById('eventMessage').innerHTML = event ? `📌 ${event}` : '✨ Сегодня обычный день';
    }
    render();
</script>
</body>
</html>
